// Subset of Android's KeyEvent codes that an Android TV will accept over the
// remote v2 channel. Numeric values match `android.view.KeyEvent` so they
// round-trip with the firmware's input dispatcher unchanged. The full list
// has ~250 entries; this file keeps the ones the UI actually maps to.
//
// Add entries lazily as the UI grows — every code we omit here just becomes
// an unsupported AndroidTvKey, never a runtime failure.
syntax = "proto3";

package atv.remote;

option java_package = "io.github.ddagunts.screencast.proto.atv";
option java_outer_classname = "RemoteKeyCodes";
option java_multiple_files = true;

enum RemoteKeyCode {
    KEYCODE_UNKNOWN = 0;
    KEYCODE_SOFT_LEFT = 1;
    KEYCODE_SOFT_RIGHT = 2;
    KEYCODE_HOME = 3;
    KEYCODE_BACK = 4;
    KEYCODE_DPAD_UP = 19;
    KEYCODE_DPAD_DOWN = 20;
    KEYCODE_DPAD_LEFT = 21;
    KEYCODE_DPAD_RIGHT = 22;
    KEYCODE_DPAD_CENTER = 23;
    KEYCODE_VOLUME_UP = 24;
    KEYCODE_VOLUME_DOWN = 25;
    KEYCODE_POWER = 26;
    KEYCODE_MENU = 82;
    KEYCODE_NOTIFICATION = 83;
    KEYCODE_SEARCH = 84;
    KEYCODE_MEDIA_PLAY_PAUSE = 85;
    KEYCODE_MEDIA_STOP = 86;
    KEYCODE_MEDIA_NEXT = 87;
    KEYCODE_MEDIA_PREVIOUS = 88;
    KEYCODE_MEDIA_REWIND = 89;
    KEYCODE_MEDIA_FAST_FORWARD = 90;
    KEYCODE_MUTE = 91;
    KEYCODE_PAGE_UP = 92;
    KEYCODE_PAGE_DOWN = 93;
    KEYCODE_VOLUME_MUTE = 164;
    KEYCODE_INFO = 165;
    KEYCODE_CHANNEL_UP = 166;
    KEYCODE_CHANNEL_DOWN = 167;
    KEYCODE_GUIDE = 172;
    KEYCODE_BOOKMARK = 174;
    KEYCODE_CAPTIONS = 175;
    KEYCODE_SETTINGS = 176;
    KEYCODE_TV_POWER = 177;
    KEYCODE_TV_INPUT = 178;
    KEYCODE_MEDIA_AUDIO_TRACK = 222;
    KEYCODE_SLEEP = 223;
    KEYCODE_WAKEUP = 224;
    KEYCODE_PAIRING = 225;
    KEYCODE_MEDIA_TOP_MENU = 226;
}

enum RemoteDirection {
    REMOTE_DIRECTION_UNKNOWN = 0;
    START_LONG = 1;
    END_LONG = 2;
    SHORT = 3;
}
